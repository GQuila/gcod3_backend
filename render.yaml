# render.yaml - One-click Render deploy for GCOD3 backend.
# Usage: in Render dashboard -> New -> Blueprint -> point at the repo containing this file.
services:
  - type: web
    name: gcod3-api
    runtime: python
    plan: free                      # upgrade to "starter" ($7/mo) for always-on
    region: oregon                  # change if you want (frankfurt, singapore, ohio)
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      # ── required: fill these in the Render dashboard ──
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: gcod3_production
      - key: JWT_SECRET
        generateValue: true         # Render generates a strong random secret
      - key: JWT_ALGO
        value: HS256
      # AI: Emergent universal key + OpenAI-compatible proxy.
      # Get yours at https://app.emergent.sh -> Profile -> Universal Key.
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://integrations.emergentagent.com/llm
      - key: AI_MODEL
        value: claude-sonnet-4-5-20250929
      - key: CORS_ORIGINS
        value: "https://www.gcod3.com,https://gcod3.com"
      # ── optional: Gmail SMTP for contact-form email delivery ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: gcod3web@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: CONTACT_TO
        value: gcod3web@gmail.com
      - key: CONTACT_FROM
        value: gcod3web@gmail.com
